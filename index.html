  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #invoice-print-area,
      #invoice-print-area * {
        visibility: visible;
      }

      #invoice-print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: white;
        padding: 20px;
        margin: 0;
      }

      /* Hide scrollbars and other UI elements */
      ::-webkit-scrollbar {
        display: none;
      }

      @page {
        margin: 0;
        size: auto;
      }
    }
  </style>
